<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cipher</title>
    <style>
        :root {
            --bg: #070A12;
            --panel: rgba(10, 14, 28, 0.85);
            --line: rgba(55, 198, 255, 0.25);
            --text: #e8f2ff;
            --muted: #88aadd;
            --accent: #37C6FF;
            --good: #51ffb7;
            --bad: #ff3b30;
            --warn: #ffb000;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg); color: var(--text);
            font-family: 'JetBrains Mono', ui-monospace, monospace;
            overflow: hidden; user-select: none;
        }

        canvas { display: block; }

        .panel {
            position: absolute; background: var(--panel);
            border: 1px solid var(--line); backdrop-filter: blur(12px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6); border-radius: 8px;
        }

        .hd {
            padding: 8px 12px; border-bottom: 1px solid var(--line);
            font-size: 11px; font-weight: 800; letter-spacing: 1px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .bd { padding: 12px; }

        .chip {
            padding: 4px 8px; border-radius: 4px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); font-size: 10px; font-weight: 700;
        }

        #top-left { top: 20px; left: 20px; width: 340px; }
        #top-right { top: 20px; right: 20px; width: 340px; text-align: right; }
        #bottom-left { bottom: 20px; left: 20px; width: 400px; height: 300px; display: flex; flex-direction: column; }
        #bottom-right { bottom: 20px; right: 20px; width: 340px; }

        .bar-container { margin-top: 10px; }
        .bar-label { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 4px; }
        .bar-outer { height: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .bar-inner { height: 100%; width: 0%; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        #hp-fill { background: var(--bad); box-shadow: 0 0 10px var(--bad); }
        #prog-fill { background: var(--good); box-shadow: 0 0 10px var(--good); }

        #controls {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; z-index: 100;
        }

        .btn {
            background: rgba(0,0,0,0.4); color: var(--text); border: 1px solid var(--line);
            padding: 15px 30px; cursor: pointer; border-radius: 4px; font-weight: 900;
            font-family: inherit; font-size: 14px; transition: all 0.1s;
        }

        .btn:hover:not(:disabled) { background: var(--line); color: #000; box-shadow: 0 0 20px var(--line); }
        .btn:active:not(:disabled) { transform: scale(0.95); }
        .btn:disabled { opacity: 0.2; cursor: not-allowed; }
        .btn-ship { border-color: var(--good); color: var(--good); }
        .btn-ship:hover:not(:disabled) { background: var(--good); color: #000; box-shadow: 0 0 20px var(--good); }

        #log { flex: 1; overflow-y: auto; padding-right: 5px; font-size: 11px; line-height: 1.5; }
        .log-entry { margin-bottom: 6px; padding: 4px 8px; border-radius: 4px; background: rgba(255,255,255,0.03); border-left: 3px solid transparent; }
        .log-clear { border-left-color: var(--good); }
        .log-flagged { border-left-color: var(--bad); color: var(--bad); }
        .log-info { border-left-color: var(--accent); color: var(--muted); }

        #overlay {
            position: absolute; inset: 0; background: rgba(5,7,12,0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; text-align: center;
        }

        .overlay-card { background: var(--panel); border: 2px solid var(--accent); padding: 40px; border-radius: 12px; max-width: 600px; }
        .overlay-card h1 { color: var(--accent); font-size: 3em; margin: 0 0 20px; letter-spacing: 5px; }
        .overlay-card p { line-height: 1.6; margin-bottom: 30px; color: var(--muted); }

        #flash { position: absolute; inset: 0; background: var(--bad); opacity: 0; pointer-events: none; z-index: 900; transition: opacity 0.1s; }
        #feedback-txt {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 5em; font-weight: 900; opacity: 0; pointer-events: none; z-index: 950;
        }

        .legend-group { margin-bottom: 10px; }
        .legend-label { font-size: 10px; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; }
        .legend-items { display: flex; gap: 5px; flex-wrap: wrap; }
        .legend-item { font-size: 10px; padding: 2px 6px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 3px; }
        .locked { opacity: 0.3; }

    </style>
</head>
<body>
    <div id="flash"></div>
    <div id="feedback-txt"></div>

    <div id="overlay">
        <div class="overlay-card">
            <h1>CIPHER</h1>
            <p>
                Complexity escalates every 2 levels.<br>
                SCAN to observe scanner output.<br>
                SHIP to earn credits. Mistakes damage the hull.<br>
                Deduce the rule. Survive the shift.
            </p>
            <button class="btn" id="start-btn">INITIALIZE SYSTEM</button>
        </div>
    </div>

    <div id="top-left" class="panel">
        <div class="hd">SYSTEM STATUS <div class="chip" id="val-level">LEVEL 1</div></div>
    </div>

    <div id="top-right" class="panel">
        <div class="hd">HULL & PROGRESS</div>
        <div class="bd">
            <div class="bar-container">
                <div class="bar-label"><span>INTEGRITY</span> <span id="txt-hp">5/5</span></div>
                <div class="bar-outer"><div class="bar-inner" id="hp-fill" style="width: 100%;"></div></div>
            </div>
            <div class="bar-container">
                <div class="bar-label"><span>CREDITS</span> <span id="txt-credits">0 / 5</span></div>
                <div class="bar-outer"><div class="bar-inner" id="prog-fill"></div></div>
            </div>
        </div>
    </div>

    <div id="bottom-left" class="panel">
        <div class="hd">DEDUCTION LOG <div class="chip" id="val-scans">0 SCANS</div></div>
        <div class="bd" id="log"></div>
    </div>

    <div id="bottom-right" class="panel">
        <div class="hd">PROPERTY LEGEND</div>
        <div class="bd" id="legend"></div>
    </div>

    <div id="controls">
        <button class="btn" id="btn-scan">SCAN [5]</button>
        <button class="btn" id="btn-pass">PASS</button>
        <button class="btn btn-ship" id="btn-ship">SHIP [COMMIT]</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script>
        const COLORS = [
            { name: 'MINT', hex: 0x00ffaa },
            { name: 'MAGENTA', hex: 0xff00ff },
            { name: 'CYAN', hex: 0x00aaff },
            { name: 'AMBER', hex: 0xffaa00 },
            { name: 'WHITE', hex: 0xffffff }
        ];
        const SIZES = [
            { name: 'SMALL', val: 0.6 },
            { name: 'MEDIUM', val: 1.0 },
            { name: 'LARGE', val: 1.4 }
        ];
        const SHAPES = ['BOX', 'SPHERE', 'CRYSTAL'];
        const MATERIALS = ['MATTE', 'METALLIC', 'GLASS'];
        const MOTIONS = ['STATIC', 'BOBBING'];

        const state = {
            level: 1, hp: 5, credits: 0, streak: 0,
            active: false, scanning: false, transitioning: false,
            currentRule: null, currentPkg: null,
            scans: 0, maxScans: 5,
            particles: [], shake: 0
        };

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x05070a);
        scene.fog = new THREE.Fog(0x05070a, 10, 40);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);

        const amb = new THREE.AmbientLight(0xffffff, 0.2);
        scene.add(amb);
        const spot = new THREE.SpotLight(0xffffff, 50);
        spot.position.set(5, 10, 5);
        scene.add(spot);
        const rim = new THREE.PointLight(0x37C6FF, 20, 20);
        rim.position.set(-5, 2, -5);
        scene.add(rim);

        const grid = new THREE.GridHelper(20, 20, 0x112233, 0x0a1118);
        grid.position.y = -1;
        scene.add(grid);

        // Conveyor Rails
        const railGeo = new THREE.BoxGeometry(0.1, 0.1, 40);
        const railMat = new THREE.MeshStandardMaterial({ color: 0x112233, emissive: 0x001122 });
        const r1 = new THREE.Mesh(railGeo, railMat);
        r1.position.set(-0.8, -0.9, 0);
        scene.add(r1);
        const r2 = new THREE.Mesh(railGeo, railMat);
        r2.position.set(0.8, -0.9, 0);
        scene.add(r2);

        let audioCtx;
        function playSfx(freq, type, dur, vol = 0.05) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(vol, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        function getUnlockedProps(lvl) {
            if (lvl <= 2) return ['color', 'size', 'shape'];
            if (lvl <= 4) return ['color', 'size', 'shape', 'material'];
            return ['color', 'size', 'shape', 'material', 'motion'];
        }

        function generateRule() {
            const props = getUnlockedProps(state.level);
            const prop = props[Math.floor(Math.random() * props.length)];
            let value;
            if (prop === 'color') value = COLORS[Math.floor(Math.random() * COLORS.length)].name;
            else if (prop === 'size') value = SIZES[Math.floor(Math.random() * SIZES.length)].name;
            else if (prop === 'shape') value = SHAPES[Math.floor(Math.random() * SHAPES.length)];
            else if (prop === 'material') value = MATERIALS[Math.floor(Math.random() * MATERIALS.length)];
            else value = MOTIONS[Math.floor(Math.random() * MOTIONS.length)];
            return { prop, value, text: `${prop.toUpperCase()} IS ${value}` };
        }

        function spawnPackage() {
            const data = {
                color: COLORS[Math.floor(Math.random() * COLORS.length)],
                size: SIZES[Math.floor(Math.random() * SIZES.length)],
                shape: SHAPES[Math.floor(Math.random() * SHAPES.length)],
                material: MATERIALS[Math.floor(Math.random() * MATERIALS.length)],
                motion: MOTIONS[Math.floor(Math.random() * MOTIONS.length)]
            };

            const unlocked = getUnlockedProps(state.level);
            if (!unlocked.includes('material')) data.material = 'MATTE';
            if (!unlocked.includes('motion')) data.motion = 'STATIC';

            let geo;
            if (data.shape === 'BOX') geo = new THREE.BoxGeometry(1, 1, 1);
            else if (data.shape === 'SPHERE') geo = new THREE.SphereGeometry(0.6, 32, 32);
            else geo = new THREE.IcosahedronGeometry(0.7);

            const mat = new THREE.MeshStandardMaterial({ color: data.color.hex });
            if (data.material === 'METALLIC') { mat.metalness = 1; mat.roughness = 0.2; }
            else if (data.material === 'GLASS') { mat.transparent = true; mat.opacity = 0.4; mat.roughness = 0; }
            else { mat.metalness = 0; mat.roughness = 0.9; }

            const mesh = new THREE.Mesh(geo, mat);
            mesh.scale.setScalar(data.size.val);
            mesh.position.set(0, 0, -20); // Spawn far back
            scene.add(mesh);

            state.currentPkg = { data, mesh, bob: Math.random() * Math.PI * 2, targetZ: 0 };
            state.transitioning = true;
        }

        function checkMatch(pkg) {
            const rule = state.currentRule;
            let val;
            if (rule.prop === 'color') val = pkg.data.color.name;
            else if (rule.prop === 'size') val = pkg.data.size.name;
            else if (rule.prop === 'shape') val = pkg.data.shape;
            else if (rule.prop === 'material') val = pkg.data.material;
            else if (rule.prop === 'motion') val = pkg.data.motion;
            return val === rule.value;
        }

        function log(msg, type = 'info') {
            const el = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            el.prepend(entry);
        }

        function updateUI() {
            document.getElementById('val-level').textContent = `LEVEL ${state.level}`;
            const scansLeft = state.maxScans - state.scans;
            document.getElementById('val-scans').textContent = `${scansLeft} / ${state.maxScans} SCANS`;
            document.getElementById('txt-hp').textContent = `${state.hp}/5`;
            document.getElementById('hp-fill').style.width = `${(state.hp / 5) * 100}%`;
            
            const goal = state.level + 4;
            document.getElementById('txt-credits').textContent = `${state.credits} • ${state.streak} / ${goal}`;
            document.getElementById('prog-fill').style.width = `${(state.streak / goal) * 100}%`;

            const scanBtn = document.getElementById('btn-scan');
            scanBtn.disabled = state.transitioning || state.scans >= state.maxScans;
            scanBtn.textContent = scansLeft > 0 ? `SCAN [${scansLeft}]` : 'NO SCANS';
            document.getElementById('btn-pass').disabled = state.transitioning;
            document.getElementById('btn-ship').disabled = state.transitioning;

            renderLegend();
        }

        function renderLegend() {
            const el = document.getElementById('legend');
            el.innerHTML = '';
            const unlocked = getUnlockedProps(state.level);
            
            const cats = [
                { id: 'color', label: 'Color', items: COLORS.map(c => c.name) },
                { id: 'size', label: 'Size', items: SIZES.map(s => s.name) },
                { id: 'shape', label: 'Shape', items: SHAPES },
                { id: 'material', label: 'Material', items: MATERIALS },
                { id: 'motion', label: 'Motion', items: MOTIONS }
            ];

            cats.forEach(cat => {
                const group = document.createElement('div');
                const isLocked = !unlocked.includes(cat.id);
                group.className = `legend-group ${isLocked ? 'locked' : ''}`;
                group.innerHTML = `<div class="legend-label">${cat.label} ${isLocked ? '[LOCKED]' : ''}</div>`;
                const items = document.createElement('div');
                items.className = 'legend-items';
                cat.items.forEach(it => {
                    items.innerHTML += `<span class="legend-item">${it}</span>`;
                });
                group.appendChild(items);
                el.appendChild(group);
            });
        }

        function flash(color = '#ff3b30') {
            const el = document.getElementById('flash');
            el.style.background = color;
            el.style.opacity = '0.8';
            setTimeout(() => el.style.opacity = '0', 100);
        }

        function triggerText(txt, color) {
            const el = document.getElementById('feedback-txt');
            el.textContent = txt;
            el.style.color = color;
            el.style.opacity = '1';
            setTimeout(() => el.style.opacity = '0', 800);
        }

        function levelUp() {
            log(`LEVEL ${state.level} CLEAR. Rule was: ${state.currentRule.text}`, 'clear');
            state.level++;
            state.streak = 0;
            state.scans = 0;
            state.currentRule = generateRule();
            updateUI();
        }

        function gameOver() {
            log(`CRITICAL FAILURE. Rule: ${state.currentRule.text}`, 'flagged');
            state.active = false;
            document.getElementById('overlay').style.display = 'flex';
        }

        function spawnParticles(pos) {
            for (let i = 0; i < 30; i++) {
                const p = {
                    mesh: new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshBasicMaterial({ color: 0x51ffb7 })),
                    vel: new THREE.Vector3((Math.random() - 0.5) * 0.3, (Math.random() - 0.5) * 0.3, (Math.random() - 0.5) * 0.3),
                    life: 1.0
                };
                p.mesh.position.copy(pos);
                scene.add(p.mesh);
                state.particles.push(p);
            }
        }

        function disposeCurrent() {
            if (state.currentPkg) {
                scene.remove(state.currentPkg.mesh);
                state.currentPkg.mesh.geometry.dispose();
                state.currentPkg.mesh.material.dispose();
                state.currentPkg = null;
            }
        }

        document.getElementById('start-btn').onclick = () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            state.hp = 5; state.credits = 0; state.streak = 0; state.level = 1; state.scans = 0;
            state.currentRule = generateRule();
            state.active = true;
            disposeCurrent();
            spawnPackage();
            updateUI();
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('log').innerHTML = '';
            log("System Initialized. Conveyor Active.", "info");
        };

        document.getElementById('btn-scan').onclick = () => {
            if (!state.active || state.transitioning || state.scans >= state.maxScans) return;
            state.scans++;
            const flagged = checkMatch(state.currentPkg);
            playSfx(flagged ? 150 : 800, 'sine', 0.2);
            const d = state.currentPkg.data;
            const unlocked = getUnlockedProps(state.level);
            let desc = [];
            unlocked.forEach(p => {
                if (p === 'color') desc.push(`COLOR:${d.color.name}`);
                else if (p === 'size') desc.push(`SIZE:${d.size.name}`);
                else desc.push(`${p.toUpperCase()}:${d[p]}`);
            });
            log(`SCAN [${flagged ? 'FLAGGED' : 'CLEAR'}]: ${desc.join(' ')}`, flagged ? 'flagged' : 'clear');
            updateUI();
        };

        document.getElementById('btn-ship').onclick = () => {
            if (!state.active || state.transitioning) return;
            const flagged = checkMatch(state.currentPkg);
            if (!flagged) {
                state.credits += 10; state.streak++;
                triggerText("+10 CREDITS", "var(--good)");
                spawnParticles(state.currentPkg.mesh.position);
                playSfx(1000, 'sine', 0.1);
                if (state.streak >= state.level + 4) levelUp();
            } else {
                state.hp--;
                flash();
                state.streak = 0;
                triggerText("BREACH!", "var(--bad)");
                state.shake = 0.5;
                playSfx(100, 'sawtooth', 0.5, 0.2);
                if (state.hp <= 0) gameOver();
            }
            state.currentPkg.targetZ = 20;
            state.transitioning = true;
            updateUI();
        };

        document.getElementById('btn-pass').onclick = () => {
            if (!state.active || state.transitioning) return;
            const flagged = checkMatch(state.currentPkg);
            if (flagged) {
                state.credits += 5; state.streak++;
                triggerText("+5 CREDITS", "var(--accent)");
                playSfx(600, 'sine', 0.1);
                if (state.streak >= state.level + 4) levelUp();
            } else {
                log("PASS: Clear item ignored.", "info");
                state.streak = 0;
            }
            state.currentPkg.targetZ = 20;
            state.transitioning = true;
            updateUI();
        };

        const clock = new THREE.Clock();
        function loop() {
            requestAnimationFrame(loop);
            const dt = clock.getDelta();
            const time = clock.elapsedTime;

            if (state.active && state.currentPkg) {
                // Animation Logic
                const pkg = state.currentPkg;
                const pos = pkg.mesh.position;
                
                // Move towards target Z
                const speed = 15;
                if (Math.abs(pos.z - pkg.targetZ) > 0.1) {
                    pos.z += (pkg.targetZ - pos.z) * speed * dt;
                } else {
                    pos.z = pkg.targetZ;
                    if (state.transitioning) {
                        if (pkg.targetZ === 20) {
                            disposeCurrent();
                            spawnPackage();
                        } else {
                            state.transitioning = false;
                            updateUI();
                        }
                    }
                }

                pkg.mesh.rotation.y += dt;
                if (pkg.data.motion === 'BOBBING') {
                    pkg.mesh.position.y = Math.sin(time * 3 + pkg.bob) * 0.3;
                }
            }

            for (let i = state.particles.length - 1; i >= 0; i--) {
                const p = state.particles[i];
                p.mesh.position.add(p.vel);
                p.life -= dt;
                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    state.particles.splice(i, 1);
                }
            }

            if (state.shake > 0) {
                state.shake -= dt;
                camera.position.x = (Math.random() - 0.5) * state.shake * 0.5;
                camera.position.y = 3 + (Math.random() - 0.5) * state.shake * 0.5;
            } else {
                camera.position.x = 0;
                camera.position.y = 3;
            }

            renderer.render(scene, camera);
        }
        loop();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
